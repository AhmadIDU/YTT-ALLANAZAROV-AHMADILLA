# ============================================================
# PossKassa — Nginx teskari proksi konfiguratsiyasi
# ============================================================

worker_processes auto;
events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Loglash
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Samaradorlik
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Fayl yuklash hajmi (Intake uchun)
    client_max_body_size 50M;

    # ─── API Gateway ─────────────────────────────────
    upstream api_gateway {
        server gateway:8000;
        keepalive 32;
    }

    # ─── Frontend ilovalar ────────────────────────────
    upstream pos_terminal {
        server pos-terminal:80;
    }

    upstream backoffice {
        server backoffice:80;
    }

    # ─── Asosiy server ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # API so'rovlari → Gateway
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;

            # CORS sarlavhalari (gateway bilan mos kelish uchun)
            add_header Access-Control-Allow-Origin  "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Tenant-ID" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Kassa terminali → pos.posskassa.uz
        location /pos/ {
            proxy_pass http://pos_terminal/;
        }

        # Backoffice → admin.posskassa.uz
        location /admin/ {
            proxy_pass http://backoffice/;
        }

        # Standart: backoffice
        location / {
            proxy_pass http://backoffice;
        }

        # Sog'liq tekshiruvi
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
