# ============================================================
# PossKassa — Kubernetes Service manifestlari
# ============================================================

# ─── API Gateway ────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: posskassa
  labels:
    app: gateway
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
