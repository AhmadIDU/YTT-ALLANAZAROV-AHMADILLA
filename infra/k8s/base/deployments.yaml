# ============================================================
# PossKassa — Kubernetes Deployment manifestlari
# ============================================================

# ─── Umumiy muhit o'zgaruvchilari referensi ─────────────
x-common-env: &common-env
  envFrom:
    - configMapRef:
        name: posskassa-config
    - secretRef:
        name: posskassa-secrets

# ─── API Gateway ────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: posskassa
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: posskassa/gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: posskassa-config
            - secretRef:
                name: posskassa-secrets
          resources:
            requests:
              cpu:    "100m"
              memory: "256Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
