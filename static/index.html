<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PossKassa — Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b}
/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#0f172a;color:#94a3b8;display:flex;flex-direction:column;flex-shrink:0}
.sidebar .logo{padding:20px 16px;border-bottom:1px solid #1e293b}
.sidebar .logo h1{color:#fff;font-size:18px;font-weight:700}
.sidebar .logo p{font-size:11px;margin-top:2px;color:#64748b}
.sidebar nav{flex:1;padding:12px 8px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;background:none;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:13px;text-align:left;transition:.15s}
.nav-btn:hover{background:#1e293b;color:#fff}
.nav-btn.active{background:#1d4ed8;color:#fff}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:15px;font-weight:600;color:#1e293b}
.content{flex:1;overflow-y:auto;padding:24px}
/* Cards */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card h3{font-size:12px;color:#64748b;font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.card .val{font-size:26px;font-weight:700;color:#1e293b}
.card .sub{font-size:12px;color:#94a3b8;margin-top:4px}
/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;border-bottom:1px solid #e2e8f0}
.tbl td{padding:11px 14px;border-bottom:1px solid #f1f5f9}
.tbl tr:hover td{background:#f8fafc}
.tbl tr:last-child td{border:none}
/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-blue{background:#2563eb;color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-gray{background:#f1f5f9;color:#374151;border:1px solid #e2e8f0}.btn-gray:hover{background:#e2e8f0}
/* Badge */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#15803d}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-yellow{background:#fef9c3;color:#a16207}
.badge-red{background:#fee2e2;color:#dc2626}
/* Form */
.form-row{display:grid;gap:12px;margin-bottom:14px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
label{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:4px}
input,select{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;transition:.15s}
input:focus,select:focus{border-color:#2563eb}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:700}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;gap:10px;justify-content:flex-end}
/* POS */
.pos-layout{display:grid;grid-template-columns:1fr 360px;gap:16px;height:calc(100vh - 52px - 48px)}
.pos-left{display:flex;flex-direction:column;gap:12px}
.pos-right{background:#fff;border-radius:12px;border:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.cart-items{flex:1;overflow-y:auto;padding:12px}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;border:1px solid #f1f5f9;margin-bottom:6px}
.cart-item .name{flex:1;font-size:13px;font-weight:500}
.cart-total{padding:12px;border-top:1px solid #e2e8f0}
.total-row{display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-bottom:4px}
.total-row.big{font-size:20px;font-weight:700;color:#1e293b;border-top:1px solid #e2e8f0;padding-top:8px;margin-top:4px}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.1s}
.qty-btn:hover{background:#dbeafe;border-color:#93c5fd}
/* Search */
.search-box{position:relative}
.search-box input{padding-left:36px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:16px;pointer-events:none}
/* Tabs */
.tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:10px;width:fit-content;margin-bottom:20px}
.tab{padding:7px 16px;border-radius:7px;border:none;background:none;font-size:13px;font-weight:500;cursor:pointer;color:#64748b;transition:.15s}
.tab.active{background:#fff;color:#1e293b;box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* Chart */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding:8px 0}
.bar-chart .bar{flex:1;border-radius:4px 4px 0 0;background:#2563eb;min-height:4px;transition:.3s}
.bar-chart .bar:hover{background:#1d4ed8;opacity:.8}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;transform:translateY(100px);opacity:0;transition:.3s;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#15803d}
.toast.err{background:#dc2626}
/* Intake */
.drop-zone{border:2px dashed #cbd5e1;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.drag{border-color:#2563eb;background:#eff6ff}
.drop-zone .icon{font-size:36px;margin-bottom:8px}
.review-row{display:grid;grid-template-columns:auto 1fr 80px 90px 100px 70px;gap:8px;align-items:center;padding:8px;border-bottom:1px solid #f1f5f9;font-size:12px}
.review-row.hdr{font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;background:#f8fafc;border-radius:8px 8px 0 0}

/* Nasiya */
.debt-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;cursor:pointer;transition:.15s}
.debt-card:hover{border-color:#f59e0b;box-shadow:0 2px 8px rgba(245,158,11,.15)}
.debt-card.danger{border-left:4px solid #dc2626}
.debt-card.warning{border-left:4px solid #f59e0b}
.debt-card.ok{border-left:4px solid #16a34a}
.debt-amount{font-size:22px;font-weight:800;color:#dc2626}
.debt-amount.paid{color:#16a34a}
.progress-bar{height:8px;background:#fee2e2;border-radius:4px;overflow:hidden;margin:6px 0}
.progress-fill{height:100%;background:#16a34a;border-radius:4px;transition:.3s}

/* Chek */
@media print{
  body > *{display:none!important}
  #print-receipt{display:block!important;position:fixed;top:0;left:0;width:100%}
}
#print-receipt{display:none}
.receipt-paper{font-family:'Courier New',monospace;font-size:13px;max-width:300px;margin:0 auto;padding:16px;background:#fff;color:#000}
.receipt-paper .r-title{text-align:center;font-weight:bold;font-size:15px;margin-bottom:4px}
.receipt-paper .r-divider{border-top:1px dashed #000;margin:8px 0}
.receipt-paper .r-row{display:flex;justify-content:space-between;margin:2px 0}
.receipt-paper .r-total{font-weight:bold;font-size:15px}
</style>
</head>
<body>
<div class="app">
 <!-- Sidebar -->
 <aside class="sidebar">
  <div class="logo"><h1>PossKassa</h1><p>Demo v1.0</p></div>
  <nav>
   <button class="nav-btn active" onclick="show('dashboard')">📊 Dashboard</button>
   <button class="nav-btn" onclick="show('pos')">🛒 Kassa (POS)</button>
   <button class="nav-btn" onclick="show('products')">📦 Mahsulotlar</button>
   <button class="nav-btn" onclick="show('debtors')">💳 Qarzdorlar</button>
   <button class="nav-btn" onclick="show('farms')">🏭 Fermalar</button>
   <button class="nav-btn" onclick="show('intake')">🚛 Tovar qabuli</button>
   <button class="nav-btn" onclick="show('reports')">📈 Hisobotlar</button>
   <button class="nav-btn" onclick="show('sales')">🧾 Sotuvlar</button>
  </nav>
 </aside>
 <!-- Main -->
 <div class="main">
  <div class="topbar">
   <h2 id="page-title">Dashboard</h2>
   <div style="display:flex;align-items:center;gap:12px">
    <span id="online-badge" class="badge badge-green">🟢 Online</span>
    <span style="font-size:13px;color:#64748b">Demo Menejer</span>
   </div>
  </div>
  <div class="content" id="main-content"></div>
 </div>
</div>
<div class="toast" id="toast"></div>
<div id="print-receipt"></div>

<script>

// Global xato ushlash
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('main-content').innerHTML = `
    <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:20px;margin:20px;font-family:monospace">
      <h3 style="color:#dc2626;margin-bottom:8px">❌ JavaScript Xato</h3>
      <div><b>Xato:</b> ${msg}</div>
      <div><b>Fayl:</b> ${src}</div>
      <div><b>Qator:</b> ${line}:${col}</div>
      <div style="margin-top:8px"><b>F12 → Console</b> da batafsil ko'ring</div>
    </div>`;
  return false;
};

const API = `http://localhost:${location.port||3500}/api/v1`;
console.log('🔌 API URL:', API);
const fmt = n => new Intl.NumberFormat('uz-UZ').format(Math.round(n)) + " so'm";
const pct = n => parseFloat(n).toFixed(1) + '%';
let cart = [], allProducts = [];

async function api(method, path, body) {
  try {
    const r = await fetch(API + path, {
      method, headers: {'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    return r.json();
  } catch(e) { return {error: e.message}; }
}

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function show(page) {
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    const pages = ['dashboard','pos','products','debtors','farms','intake','reports','sales'];
    b.classList.toggle('active', pages[i] === page);
  });
  const titles = {dashboard:'📊 Dashboard', pos:'🛒 Kassa Terminali',
    products:'📦 Mahsulotlar', debtors:'💳 Qarzdorlar va Nasiya',
    farms:'🏭 Fermalar', intake:'🚛 Tovar Qabuli (Kirim)',
    reports:'📈 Hisobotlar', sales:'🧾 Sotuvlar'};
  document.getElementById('page-title').textContent = titles[page] || page;
  ({dashboard, pos, products, debtors, farms, intake, reports, sales})[page]();
}

// ═══════════════════ DASHBOARD ═══════════════════
async function dashboard() {
  const el = document.getElementById('main-content');
  el.innerHTML = '<p style="color:#94a3b8;padding:40px;text-align:center;font-size:16px">⏳ Yuklanmoqda...</p>';
  try {
    const [dash, top] = await Promise.all([
      api('GET','/dashboard'),
      api('GET','/reports/top-products')
    ]);
    if (dash.error) throw new Error('API xato: ' + dash.error);
    const t = dash.today || {};

    const payBreak = (dash.payment_breakdown||[]).map(p =>
      `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f1f5f9">
        <span style="color:#64748b;text-transform:capitalize">${p.method}</span>
        <span style="font-weight:600">${fmt(p.total||0)}</span>
      </div>`
    ).join('');

    const topRows = (top||[]).slice(0,8).map((p,i) => `
      <tr>
        <td><span style="color:#94a3b8">${i+1}</span></td>
        <td style="font-weight:500">${p.product_name||'-'}</td>
        <td style="text-align:right">${(p.total_qty||0).toFixed(1)}</td>
        <td style="text-align:right;font-weight:700;color:#2563eb">${fmt(p.total_revenue||0)}</td>
      </tr>`).join('');

    const maxRev = Math.max(...(top||[]).map(p=>p.total_revenue||0), 1);
    const bars = (top||[]).slice(0,10).map(p => {
      const h = Math.max(6, (p.total_revenue/maxRev)*100);
      return `<div class="bar" style="height:${h}%" title="${p.product_name}: ${fmt(p.total_revenue||0)}"></div>`;
    }).join('');

    el.innerHTML = `
    <div class="grid-4">
      <div class="card"><h3>Bugungi sotuvlar</h3><div class="val">${t.sales_count||0}</div><div class="sub">ta sotuv</div></div>
      <div class="card"><h3>Bugungi daromad</h3><div class="val" style="color:#15803d">${fmt(t.revenue||0)}</div></div>
      <div class="card"><h3>O'rtacha chek</h3><div class="val" style="color:#7c3aed">${fmt(t.avg_check||0)}</div></div>
      <div class="card"><h3>Mahsulot turi</h3><div class="val" style="color:#d97706" id="prod-count">-</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>Top mahsulotlar (daromad)</h3>
        <div class="bar-chart">${bars}</div>
        <table class="tbl" style="margin-top:12px">
          <thead><tr><th>#</th><th>Mahsulot</th><th style="text-align:right">Miqdor</th><th style="text-align:right">Daromad</th></tr></thead>
          <tbody>${topRows}</tbody>
        </table>
      </div>
      <div class="card">
        <h3>To'lov usullari</h3>
        <div style="margin-top:8px">${payBreak || '<p style="color:#94a3b8;text-align:center;padding:20px">Sotuv yo\'q</p>'}</div>
      </div>
    </div>`;

    api('GET','/products').then(d => {
      document.getElementById('prod-count').textContent = (d||[]).length;
    });

  } catch(err) {
    el.innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:48px;margin-bottom:16px">⚠️</div>
        <h2 style="color:#dc2626;margin-bottom:8px">Server bilan bog'lanishda xato</h2>
        <p style="color:#64748b;margin-bottom:20px">Server ishlamayapti yoki port noto'g'ri</p>
        <div style="background:#f1f5f9;border-radius:10px;padding:16px;display:inline-block;text-align:left;font-family:monospace;font-size:13px">
          <div>✅ Terminalni tekshiring:</div>
          <div style="color:#2563eb;margin-top:8px">py -3.14 server.py 3500 mysql</div>
          <div style="color:#64748b;margin-top:4px">http://localhost:3500</div>
        </div><br><br>
        <button onclick="dashboard()" class="btn btn-blue">🔄 Qayta urinish</button>
      </div>`;
    console.error('Dashboard xato:', err);
  }
}

// ═══════════════════ POS TERMINAL ═══════════════════
async function pos() {
  allProducts = await api('GET','/products');
  const el = document.getElementById('main-content');
  el.innerHTML = `
  <div class="pos-layout">
    <div class="pos-left">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="pos-search" placeholder="Mahsulot nomi yoki shtrixkod..." oninput="posSearch(this.value)" autofocus>
      </div>
      <div id="pos-results" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px"></div>
    </div>
    <div class="pos-right">
      <div style="padding:14px 16px;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:14px">🛒 Savatcha</div>
      <div class="cart-items" id="cart-items">
        <div style="text-align:center;color:#94a3b8;padding:40px 20px;font-size:13px">Savatcha bo'sh.<br>Mahsulot qo'shing.</div>
      </div>
      <div class="cart-total">
        <div class="total-row"><span>Mahsulotlar:</span><span id="cart-count">0 ta</span></div>
        <div class="total-row"><span>QQS (12%):</span><span id="cart-vat">0 so'm</span></div>
        <div class="total-row big"><span>JAMI:</span><span id="cart-total" style="color:#2563eb">0 so'm</span></div>
        <button class="btn btn-blue" style="width:100%;margin-top:10px;padding:13px;font-size:15px" onclick="openPayment()">💳 To'lov</button>
        <button class="btn btn-gray" style="width:100%;margin-top:6px" onclick="cart=[];renderCart()">🗑 Tozalash</button>
      </div>
    </div>
  </div>`;
  posSearch('');
}

function posSearch(q) {
  const filtered = q ? allProducts.filter(p =>
    p.name.toLowerCase().includes(q.toLowerCase()) || (p.barcode||'').includes(q)
  ) : allProducts.slice(0, 24);
  document.getElementById('pos-results').innerHTML = filtered.map(p => `
    <div onclick="addToCart('${p.id}')" style="background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px;cursor:pointer;transition:.15s" onmouseover="this.style.borderColor='#2563eb'" onmouseout="this.style.borderColor='#e2e8f0'">
      <div style="font-weight:600;font-size:13px;margin-bottom:4px">${p.name}</div>
      <div style="font-size:11px;color:#94a3b8">${p.barcode||p.unit}</div>
      <div style="font-weight:700;color:#2563eb;margin-top:6px">${fmt(p.price)}</div>
      <div style="font-size:11px;color:${p.stock_qty<20?'#dc2626':'#16a34a'};margin-top:2px">Zaxira: ${p.stock_qty||0}</div>
    </div>`).join('');
}

function addToCart(pid) {
  const p = allProducts.find(x=>x.id===pid); if(!p) return;
  const ex = cart.find(c=>c.product.id===pid);
  if(ex) ex.quantity++;
  else cart.push({product:p, quantity:1});
  renderCart();
  toast(`✅ ${p.name} qo'shildi`);
}

function renderCart() {
  const el = document.getElementById('cart-items');
  if(!cart.length){
    el.innerHTML='<div style="text-align:center;color:#94a3b8;padding:40px 20px;font-size:13px">Savatcha bo\'sh.<br>Mahsulot qo\'shing.</div>';
    document.getElementById('cart-total').textContent='0 so\'m';
    document.getElementById('cart-count').textContent='0 ta';
    document.getElementById('cart-vat').textContent='0 so\'m';
    return;
  }
  el.innerHTML = cart.map((c,i)=>`
    <div class="cart-item">
      <button class="qty-btn" onclick="updateQty(${i},-1)">−</button>
      <div class="name">
        <div>${c.product.name}</div>
        <div style="font-size:11px;color:#94a3b8">${fmt(c.product.price)} × ${c.quantity}</div>
      </div>
      <button class="qty-btn" onclick="updateQty(${i},1)">+</button>
      <div style="font-weight:700;color:#2563eb;min-width:80px;text-align:right">${fmt(c.product.price*c.quantity)}</div>
      <button class="qty-btn" style="color:#dc2626" onclick="removeFromCart(${i})">✕</button>
    </div>`).join('');
  const total = cart.reduce((s,c)=>s+c.product.price*c.quantity,0);
  const vat   = total * 12 / 112;
  document.getElementById('cart-total').textContent=fmt(total);
  document.getElementById('cart-count').textContent=`${cart.length} tur`;
  document.getElementById('cart-vat').textContent=fmt(vat);
}

function updateQty(i,d){
  cart[i].quantity+=d;
  if(cart[i].quantity<=0) cart.splice(i,1);
  renderCart();
}
function removeFromCart(i){ cart.splice(i,1); renderCart(); }

function openPayment() {
  if(!cart.length){toast('Savatcha bo\'sh!','err');return;}
  const total = cart.reduce((s,c)=>s+c.product.price*c.quantity,0);
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-bg" id="pay-modal">
    <div class="modal">
      <div class="modal-header"><h3>💳 To'lov</h3><button class="btn btn-gray" onclick="document.getElementById('pay-modal').remove()">✕</button></div>
      <div class="modal-body">
        <div style="background:#eff6ff;border-radius:10px;padding:16px;text-align:center;margin-bottom:16px">
          <div style="font-size:12px;color:#64748b">To'lash kerak</div>
          <div style="font-size:32px;font-weight:800;color:#2563eb">${fmt(total)}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
          ${['💵 Naqd','💳 Uzcard','📱 Payme','📱 Click','💳 Humo','📱 Uzum'].map((m,i)=>`
          <button onclick="selectPayMethod(this,'${['cash','uzcard','payme','click','humo','uzum'][i]}')"
            style="padding:10px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;font-weight:500;transition:.15s"

async function completeSale(total) {
  const items = cart.map(c=>({
    product_id:c.product.id, product_name:c.product.name,
    quantity:c.quantity, unit_price:c.product.price,
    total_price:c.product.price*c.quantity
  }));
  const sale = await api('POST','/sales',{
    total_amount: total,
    payment_method: window._payMethod||'cash',
    payments:[{method:window._payMethod||'cash',amount:total}],
    items
  });

  cart=[]; renderCart();
  toast(`✅ Sotuv amalga oshirildi! Chek: ${sale.receipt_number}`);

}

// ── Rasm tushirilganda (drag & drop) ──────────────────────
function handlePhotoDrop(event) {
  event.preventDefault();
  document.getElementById('photo-drop-zone').classList.remove('drag');
  const file = event.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    processPhotoFile(file);
  } else {
    toast('Faqat rasm fayllari qabul qilinadi!', 'err');
  }
}

// ── Faylni tanlaganda ─────────────────────────────────────
function handlePhotoSelect(input) {
  const file = input.files[0];
  if (file) processPhotoFile(file);
}

// ── Rasmni base64 ga aylantirish va serverga yuborish ─────
async function processPhotoFile(file) {
  // Rasmni preview ko'rsatish
  const previewUrl = URL.createObjectURL(file);
  const zone = document.getElementById('photo-drop-zone');
  zone.innerHTML = `
    <img src="${previewUrl}" style="max-height:180px;max-width:100%;border-radius:8px;margin-bottom:8px">
    <div id="ocr-status" style="font-size:13px;font-weight:600;color:#2563eb">
      ⏳ Claude Vision tahlil qilmoqda...
    </div>`;

  // Base64 ga o'girish
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64full = e.target.result; // "data:image/jpeg;base64,..."
    const [header, base64data] = base64full.split(',');
    const mediaType = header.match(/data:(.*);base64/)?.[1] || 'image/jpeg';

    try {
      document.getElementById('ocr-status').textContent = '🤖 Claude Vision ishlamoqda... (5-15 soniya)';
      const res = await api('POST', '/intake/photo', {
        image_base64: base64data,
        media_type:   mediaType,
        filename:     file.name,
      });

      if (res.draft_id) {
        const msg = res.rows_count > 0
          ? `✅ ${res.rows_count} ta tovar aniqladi!`
          : '⚠️ Tovarlar aniqlanmadi — qo\'lda kiriting';
        document.getElementById('ocr-status').textContent = msg;
        toast(`🤖 ${res.message || msg}`);
        setTimeout(() => reviewDraft(res.draft_id), 600);
      } else {
        document.getElementById('ocr-status').textContent = '❌ Xato yuz berdi';
        toast(res.error || 'Xato', 'err');
      }
    } catch (err) {
      document.getElementById('ocr-status').textContent = '❌ Server bilan bog\'lanishda xato';
      toast('Server xatosi', 'err');
    }
  };
  reader.readAsDataURL(file);
}

// Qator narxi o'zgarganda jami yangilash
function updateRowTotal(i) {
  const qty  = parseFloat(document.getElementById(`rqty-${i}`)?.value) || 0;
  const cost = parseFloat(document.getElementById(`rcost-${i}`)?.value) || 0;
  const el   = document.getElementById(`rtotal-${i}`);
  if (el) el.textContent = fmt(qty * cost);
  updateTotal();
}

// Barcha belgilangan qatorlarning umumiy summasini hisoblash
function updateTotal() {
  const rows = window._draftRows || [];
  let total = 0;
  rows.forEach((_,i) => {
    if (!document.getElementById(`chk-${i}`)?.checked) return;
    const qty  = parseFloat(document.getElementById(`rqty-${i}`)?.value) || 0;
    const cost = parseFloat(document.getElementById(`rcost-${i}`)?.value) || 0;
    total += qty * cost;
  });
  const el = document.getElementById('review-total');
  if (el) el.textContent = fmt(total);
}

// Barchasini belgilash / olib tashlash
function checkAll(state) {
  const rows = window._draftRows || [];
  rows.forEach((_,i) => {
    const chk = document.getElementById(`chk-${i}`);
    if (chk) { chk.checked = state; toggleRow(i); }
  });
  updateTotal();
}

async function approveDraft(id, count) {
  const reviewed = window._draftRows.map((r,i)=>({
    ...r,
    name:      document.getElementById(`rname-${i}`)?.value || r.name,
    qty:       parseFloat(document.getElementById(`rqty-${i}`)?.value)  || r.qty,
    unit_cost: parseFloat(document.getElementById(`rcost-${i}`)?.value) || r.unit_cost,
    approved:  document.getElementById(`chk-${i}`)?.checked !== false,
    total_cost:(parseFloat(document.getElementById(`rqty-${i}`)?.value)||r.qty) *
               (parseFloat(document.getElementById(`rcost-${i}`)?.value)||r.unit_cost)
  }));

  const approvedCount = reviewed.filter(r=>r.approved).length;
  const totalCost = reviewed.filter(r=>r.approved).reduce((s,r)=>s+r.total_cost,0);

  const warehouses = await api('GET','/warehouses');
  const wid = warehouses[0]?.id || 'wh-001';
  const res = await api('POST',`/intake/drafts/${id}/approve`,{reviewed_rows:reviewed,warehouse_id:wid});
  document.getElementById('review-modal')?.remove();

  toast(`✅ ${res.items_count||approvedCount} ta tovar bazaga saqlandi! Jami: ${fmt(res.total_cost||totalCost)}`);
  intake();
}
async function rejectDraft(id){
  await api('POST',`/intake/drafts/${id}/reject`,{reason:'Inson tomonidan rad etildi'});
  document.getElementById('review-modal')?.remove();
  toast('❌ Kirim rad etildi','err'); intake();
}

function showPrintModal(html, title) {

    </div>
  </div>`);
  window._printHtml = html;
}

function doPrint(title) {
  const w = window.open('','_blank','width=400,height=600');
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title>
  <style>
    body{font-family:'Courier New',monospace;font-size:13px;max-width:300px;margin:20px auto;color:#000}
    .r-row{display:flex;justify-content:space-between;margin:3px 0}
    .r-title{text-align:center;font-weight:bold;font-size:15px;margin-bottom:4px}
    .r-divider{border-top:1px dashed #000;margin:8px 0}
    .r-total{font-weight:bold;font-size:15px}
  </style></head><body>${window._printHtml}</body></html>`);
  w.document.close();
  w.focus();
  w.print();
  w.close();
}

async function saveNasiyaFromPos(total) {
  let debtorId = document.getElementById('nasiya-debtor').value;
  if (!debtorId) { toast('Qarzdorni tanlang!','err'); return; }

  // Yangi qarzdor yaratish
  if (debtorId === '__new__') {
    const name = document.getElementById('ni-name').value.trim();
    if (!name) { toast('Ism kiritilishi shart!','err'); return; }
    const nd = await api('POST','/debtors',{
      full_name: name,
      phone: document.getElementById('ni-phone').value,
    });
    debtorId = nd.id;
  }

  // Sotuvni yaratish (nasiya sifatida)
  const saleItems = cart.map(c=>({
    product_id: c.product.id, product_name: c.product.name,
    quantity: c.quantity, unit_price: c.product.price, total_price: c.product.price*c.quantity
  }));
  const sale = await api('POST','/sales',{
    total_amount: total, payment_method: 'nasiya',
    payments: [{method:'nasiya', amount: total}],
    items: saleItems
  });

  // Qarz yozish
  const debt = await api('POST','/debts',{
    debtor_id: debtorId,
    sale_id: sale.id,
    amount: total,
    paid_amount: 0,
    description: document.getElementById('nasiya-note').value || `Sotuv ${sale.receipt_number}`
  });

  document.getElementById('nasiya-pos-modal')?.remove();
  cart = []; renderCart();
  toast(`✅ Nasiyaga yozildi! Qarz: ${fmt(total)}`);

  // Nasiya cheki
  const debtor = await api('GET', `/debtors/${debtorId}`);
  printDebtPayReceipt({
    receipt_number: sale.receipt_number,
    paid: 0, debt: debt, debtor: debtor,
    message: `Nasiya: ${fmt(total)}`
  });
}

function farmPayAllModal(fid, fname, totalDebt) {
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-bg" id="farm-pay-all-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>💰 Barcha qarzni yopish — ${fname}</h3>

      </div>
      <div class="modal-body">
        <div style="background:#fef9c3;border-radius:12px;padding:16px;text-align:center;margin-bottom:16px">
          <div style="font-size:12px;color:#a16207;margin-bottom:4px">Jami barcha qarzlar</div>
          <div style="font-size:34px;font-weight:800;color:#dc2626">${fmt(totalDebt)}</div>
          <div style="font-size:11px;color:#a16207;margin-top:4px">

          </div>
        </div>
        <div class="form-row cols-2">
          <div><label>To'lov miqdori *</label>
            <input id="fpa-amount" type="number" min="1" value="${totalDebt}" autofocus
              oninput="updatePayAllChange(${totalDebt})">
          </div>
          <div><label>To'lov usuli</label>
            <select id="fpa-method">
              <option value="cash">💵 Naqd</option>
              <option value="uzcard">💳 Uzcard</option>
              <option value="humo">💳 Humo</option>
              <option value="payme">📱 Payme</option>
              <option value="click">📱 Click</option>
            </select>
          </div>
        </div>
        <div id="pay-all-change" style="display:none;background:#f0fdf4;border-radius:8px;padding:10px;
          display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="color:#15803d;font-weight:600">Qaytim:</span>
          <span id="pay-all-change-val" style="color:#15803d;font-weight:700"></span>
        </div>
        <div class="form-row"><div><label>Izoh</label>
          <input id="fpa-note" placeholder="Barcha qarz to'landi..."></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gray" onclick="document.getElementById('farm-pay-all-modal').remove()">Bekor</button>
        <button class="btn btn-green" style="padding:10px 28px;font-size:14px"
          onclick="processFarmPayAll('${fid}',${totalDebt})">
          ✅ Barcha qarzni yopish
        </button>
      </div>
    </div>
  </div>`);
}

function updatePayAllChange(totalDebt) {
  const paid = parseFloat(document.getElementById('fpa-amount')?.value)||0;
  const change = paid - totalDebt;
  const box = document.getElementById('pay-all-change');
  if (box) {
    box.style.display = change > 0 ? 'flex' : 'none';
    const v = document.getElementById('pay-all-change-val');
    if (v) v.textContent = fmt(change);
  }
}

async function processFarmPayAll(fid, totalDebt) {
  const amount = parseFloat(document.getElementById('fpa-amount').value);
  if (!amount||amount<=0) { toast('Miqdor kiritilishi shart!','err'); return; }
  const method = document.getElementById('fpa-method').value;
  const note   = document.getElementById('fpa-note').value || 'Barcha qarz to\'landi';

  // Server dan barcha faol qarzlarni olish
  const farmData = await api('GET', `/farms/${fid}`);
  const activeDebts = (farmData.debts||[]).filter(d=>d.status==='active');

  if (activeDebts.length === 0) {
    toast('Faol qarz topilmadi!','err'); return;
  }

  // Har bir qarzni navbatma-navbat yopish
  let remaining = amount;
  let paidCount = 0;
  let totalPaid = 0;
  const results = [];

  for (const debt of activeDebts) {
    if (remaining <= 0) break;
    const payAmt = Math.min(remaining, debt.remaining);
    const res = await api('POST', `/farm-debts/${debt.id}/pay`, {
      amount: payAmt, payment_method: method, note
    });
    remaining  -= payAmt;
    totalPaid  += payAmt;
    paidCount++;
    results.push(res);
  }

  document.getElementById('farm-pay-all-modal')?.remove();
  document.getElementById('farm-detail-modal')?.remove();

  toast(`✅ ${paidCount} ta qarz yopildi! Jami to'landi: ${fmt(totalPaid)}`);

  // Chek chop etish
  printFarmPayAllReceipt(fid, farmData.name, farmData.owner_name, activeDebts, totalPaid, method);
  farms();
}

function supplyItemRow(i) {
  return `<div id="sitem-${i}" style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;margin-bottom:4px;align-items:center">
    <input id="si-name-${i}" placeholder="Mahsulot nomi" style="font-size:12px;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px">
    <input id="si-qty-${i}" type="number" min="0" value="1" placeholder="1" oninput="calcSupplyTotal()" style="font-size:12px;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;text-align:center">
    <select id="si-unit-${i}" style="font-size:12px;border:1px solid #e2e8f0;border-radius:6px;padding:5px">
      <option value="pcs">dona</option><option value="kg">kg</option>
      <option value="l">litr</option><option value="box">quti</option>
    </select>
    <input id="si-price-${i}" type="number" min="0" value="0" oninput="calcSupplyTotal()" style="font-size:12px;border:1px solid #e2e8f0;border-radius:6px;padding:5px 8px;text-align:right">
    <button onclick="removeSupplyItem(${i})" style="background:none;border:none;cursor:pointer;color:#dc2626;font-size:16px">×</button>
  </div>`;
}

function addSupplyItem() {
  const n = window._supplyItemCount||1;
  document.getElementById('supply-items-list').insertAdjacentHTML('beforeend', supplyItemRow(n));
  window._supplyItemCount = n+1;
}

function removeSupplyItem(i) {
  document.getElementById(`sitem-${i}`)?.remove();
  calcSupplyTotal();
}

function calcSupplyTotal() {
  let total = 0;
  for (let i=0; i<(window._supplyItemCount||1)+5; i++) {
    const qty   = parseFloat(document.getElementById(`si-qty-${i}`)?.value)||0;
    const price = parseFloat(document.getElementById(`si-price-${i}`)?.value)||0;
    total += qty * price;
  }
  const disp = document.getElementById('fs-total-display');
  if (disp) disp.textContent = fmt(total);
  window._supplyTotal = total;
  updateSupplyDebt();
}

function updateSupplyDebt() {
  const ptype = document.getElementById('fs-ptype')?.value;
  const total = window._supplyTotal||0;
  const paidRow  = document.getElementById('fs-paid-row');
  const debtDisp = document.getElementById('fs-debt-display');

  if (ptype === 'nasiya') {
    if (paidRow)  paidRow.style.display='none';
    if (debtDisp) { debtDisp.style.display='block'; debtDisp.textContent=`Nasiya: ${fmt(total)}`; }
  } else if (ptype === 'qisman') {
    if (paidRow)  paidRow.style.display='block';
    const paid = parseFloat(document.getElementById('fs-paid')?.value)||0;
    const debt = Math.max(0, total-paid);
    if (debtDisp) { debtDisp.style.display = debt>0?'block':'none'; debtDisp.textContent=`Qarz: ${fmt(debt)}`; }
  } else {
    if (paidRow)  paidRow.style.display='none';
    if (debtDisp) debtDisp.style.display='none';
  }
}

async function saveFarmSupply(fid) {
  calcSupplyTotal();
  const total = window._supplyTotal||0;
  if (!total) { toast('Kamida bitta mahsulot narxini kiriting!','err'); return; }

  const ptype = document.getElementById('fs-ptype').value;
  let paid = total;
  if (ptype === 'nasiya')  paid = 0;
  if (ptype === 'qisman')  paid = parseFloat(document.getElementById('fs-paid')?.value)||0;

  // Mahsulot qatorlarini yig'ish
  const items = [];
  for (let i=0; i<(window._supplyItemCount||1)+5; i++) {
    const name = document.getElementById(`si-name-${i}`)?.value?.trim();
    if (!name) continue;
    const qty   = parseFloat(document.getElementById(`si-qty-${i}`)?.value)||1;
    const price = parseFloat(document.getElementById(`si-price-${i}`)?.value)||0;
    items.push({ product_name:name,
      quantity:qty, unit: document.getElementById(`si-unit-${i}`)?.value||'pcs',
      unit_price:price, total_price:qty*price });
  }

  const res = await api('POST','/farm-supplies',{
    farm_id: fid,
    supply_number: document.getElementById('fs-num').value || null,
    total_amount: total, payment_type: ptype,
    paid_amount: paid, notes: document.getElementById('fs-notes').value,
    items,
  });
  document.getElementById('farm-supply-modal')?.remove();
  toast(`✅ Yetkazma saqlandi! ${fmt(total)} | ${ptype==='nasiya'?'Nasiyaga':'Naqd'}`);
  if (ptype !== 'naqd') {
    toast(`⚠️ Qarz: ${fmt(total-paid)} — Qarzdorlar ro'yxatiga qo'shildi`);
  }
  farms();
}

  const drows = (f.debts||[]).map(d=>
    `<div class="r-row"><span>${d.description||'Qarz'}</span><span style="color:#dc2626">${fmt(d.remaining)}</span></div>`
  ).join('');
  const html = `<div class="receipt-paper">

    <div class="r-divider"></div>

    <div class="r-divider"></div>
    <div class="r-row"><span>Jami yetkazildi:</span><span>${fmt(f.total_supplied)}</span></div>
